version: "3"

services:
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app/frontend
    working_dir: /app/frontend
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0

  mesh-generator:
    image: mikimiki2002/garverselod:latest
    container_name: mesh-generator
    ports:
      - "8001:8000"
    volumes:
      - ./backend/mesh-generator/demo/dress_demo/inputs:/workspace/GarVerseLOD/demo/dress_demo/inputs
      - ./backend/mesh-generator/demo/dress_demo/outputs:/workspace/GarVerseLOD/demo/dress_demo/outputs
      - ./backend/mesh-generator/demo/dress_demo/support_data:/workspace/GarVerseLOD/demo/dress_demo/support_data
      - ./backend/mesh-generator/demo/dress_demo/1_coarse/ICON_get_smpl/data:/workspace/GarVerseLOD/demo/dress_demo/1_coarse/ICON_get_smpl/data
      - ./backend/mesh-generator/demo/dress_demo/1_coarse/ICON_get_smpl/lib/dataset:/workspace/GarVerseLOD/demo/dress_demo/1_coarse/ICON_get_smpl/lib/dataset
      - ./models/u2net.onnx:/root/.u2net/u2net.onnx
    working_dir: /workspace/GarVerseLOD/demo/dress_demo


  pattern-estimator:
    build: ./backend/pattern-generator
    environment:
      - PYTHONPATH=/workspace/Garment-Pattern-Generator/packages
    volumes:
      - ./backend/pattern-generator/Garment-Pattern-Estimation:/workspace/Garment-Pattern-Estimation
      - ./backend/pattern-generator/Garment-Pattern-Generator:/workspace/Garment-Pattern-Generator
    working_dir: /workspace/Garment-Pattern-Estimation
    ports:
      - "8002:8000"
    tty: true